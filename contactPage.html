    <body
        <a href="homePage.html">Home</a><br>

        <h2 id="CF"> Contact Form</h2>
        <form id="contactForm">
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required></input><br><br>
            <label for="phone">Phone Number:</label><br>
            <input type="text" id="phone" name="phone" required></input><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required></input><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
            <div class="button-container-contact">
                <button>Submit</button>
            </div>
        </form>
    </body>
</html>
